name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Check formatting
        run: cargo fmt --check --verbose

  clippy:
    name: Clippy Lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run clippy
        run: cargo clippy -- -D warnings

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build --verbose

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test --verbose

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        run: docker build -t blog-platform .

  docker-smoke-test:
    name: Docker Compose Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Create test .env file
        run: |
          cat > .env << EOF
          DOMAIN=localhost
          POSTGRES_USER=blog
          POSTGRES_PASSWORD=changeme
          POSTGRES_DB=blog_platform
          DATABASE_URL=postgres://blog:changeme@postgres:5432/blog_platform
          MINIO_ENDPOINT=minio:9000
          MINIO_BUCKET=blog-media
          MINIO_ACCESS_KEY=minioadmin
          MINIO_SECRET_KEY=minioadmin
          APP_HOST=0.0.0.0
          APP_PORT=3000
          RUST_LOG=info
          SESSION_SECRET=dev-secret-change-in-production-min-32-chars
          EOF
      - name: Build Docker image
        run: docker build -t blog-platform .
      - name: Start services
        run: docker compose up -d
      - name: Wait for services
        run: sleep 15
      - name: Test health endpoint
        run: |
          curl -f http://localhost:3000/health || exit 1
      - name: Stop services
        run: docker compose down

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit
        run: cargo install cargo-audit
      - name: Run security audit
        run: cargo audit

  outdated:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-outdated
        run: cargo install cargo-outdated
      - name: Check outdated
        run: cargo outdated --exit-code 1
