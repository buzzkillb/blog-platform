{% extends "base.html" %}

{% block content %}
<article class="prose">
    <h1>{{ title }}</h1>
    
    <div class="content">
        {% if title == "Blog" and posts %}
            {% for post in posts %}
            <article class="post-card">
                <h2>
                    <a href="/blog/{{ post.slug }}">{{ post.title }}</a>
                </h2>
                {% if post.excerpt %}<p class="excerpt">{{ post.excerpt }}</p>{% endif %}
                <small class="date">{{ post.published_at }}</small>
            </article>
            {% endfor %}
        {% else %}
            {{ content | safe }}
        {% endif %}
    </div>
</article>
{% endblock %}
