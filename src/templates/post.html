{% extends "base.html" %}

{% block content %}
<article class="prose">
    <h1>{{ title }}</h1>
    <time class="date">{{ published_at }}</time>
    
    {% if featured_image %}
    <figure>
        <img src="{{ featured_image }}" alt="{{ title }}">
        <figcaption>{{ title }}</figcaption>
    </figure>
    {% endif %}
    
    <div class="content">
        {{ content | safe }}
    </div>
    
    <hr style="margin: 3rem 0; border-color: #30363d;">
    
    <nav>
        <a href="/">&larr; Back to all posts</a>
    </nav>
</article>
{% endblock %}
